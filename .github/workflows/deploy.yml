name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
          auth-type: SERVICE_PRINCIPAL

      - name: Log in to ACR
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build and push Docker image
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          IMAGE_TAG="sha-$SHORT_SHA"
          docker build \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/ideas-bot:$IMAGE_TAG \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/ideas-bot:latest \
            .
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/ideas-bot:$IMAGE_TAG
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/ideas-bot:latest

      - name: Update Container App Job image
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          az containerapp job update \
            --name ideas-bot-prod \
            --resource-group my-website-prod-rg \
            --image ${{ secrets.ACR_LOGIN_SERVER }}/ideas-bot:sha-$SHORT_SHA \
            2>/dev/null || echo "Job not yet deployed â€" image will be set on next Bicep deploy"

  update-arch-content:
    needs: build-and-deploy
    uses: skarumbu/my-website/.github/workflows/arch-content-update-reusable.yml@main
    with:
      repo_name: ideas-bot
      commit_sha: ${{ github.sha }}
      commit_message: ${{ github.event.head_commit.message }}
    secrets:
      ARCH_CONTENT_FOUNDRY_KEY: ${{ secrets.ARCH_CONTENT_FOUNDRY_KEY }}
      ARCH_UPDATE_GH_TOKEN: ${{ secrets.DESIGN_DOC_GH_TOKEN }}
