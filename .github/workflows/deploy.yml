name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
          auth-type: SERVICE_PRINCIPAL

      - name: Log in to ACR
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build and push Docker image
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          IMAGE_TAG="sha-$SHORT_SHA"
          docker build \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/ideas-bot:$IMAGE_TAG \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/ideas-bot:latest \
            .
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/ideas-bot:$IMAGE_TAG
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/ideas-bot:latest

      - name: Update Container App Job image
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          az containerapp job update \
            --name ideas-bot-prod \
            --resource-group my-website-prod-rg \
            --image ${{ secrets.ACR_LOGIN_SERVER }}/ideas-bot:sha-$SHORT_SHA \
            2>/dev/null || echo "Job not yet deployed — image will be set on next Bicep deploy"

  update-architecture:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout my-website
        uses: actions/checkout@v4
        with:
          repository: skarumbu/my-website
          token: ${{ secrets.DESIGN_DOC_GH_TOKEN }}

      - name: Update deploy metadata
        run: |
          git pull origin main
          DATE=$(date -u +%Y-%m-%d)
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          jq --arg date "$DATE" --arg sha "$SHORT_SHA" \
            '.["ideas-bot"] = {"lastDeploy": $date, "commitSha": $sha}' \
            src/architecture-metadata.json > /tmp/meta.json
          mv /tmp/meta.json src/architecture-metadata.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/architecture-metadata.json
          git diff --staged --quiet && exit 0
          git commit -m "chore: update ideas-bot deploy metadata"
          git push

  update-arch-content:
    needs: update-architecture
    uses: skarumbu/my-website/.github/workflows/arch-content-update-reusable.yml@main
    with:
      repo_name: ideas-bot
      commit_sha: ${{ github.sha }}
      commit_message: ${{ github.event.head_commit.message }}
    secrets:
      AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
      ARCH_UPDATE_GH_TOKEN: ${{ secrets.DESIGN_DOC_GH_TOKEN }}
